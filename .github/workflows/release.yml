# This File is automatically synchronized from https://github.com/Glatzel/template

name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
        description: "Tag to release (e.g., v1.2.3)"

permissions:
  contents: write

jobs:
  create-release:
    if: ${{!failure()}}
    runs-on: ubuntu-slim
    steps:
      - id: check-tag
        run: |
          $tag="$env:INPUTS_TAG"
          Write-Output "tag: $tag"
          if("$tag" -match '^v\d+\.\d+\.\d+$' ){"IS_PRE_RELEASE=false" >> "$env:GITHUB_OUTPUT"}
          elseif("$tag" -match '^v\d+\.\d+\.\d+-.*$') {"IS_PRE_RELEASE=true" >> "$env:GITHUB_OUTPUT"}
          else{throw "Unknown version: '$tag'"}
        shell: pwsh
        env:
          INPUTS_TAG: ${{inputs.tag}}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: clear-tag-and-release
        run: |
          if($(gh api /repos/${{github.repository}}/tags --jq '.[].name') -contains "$env:INPUTS_TAG")
          {
              write-output "tag $env:INPUTS_TAG exists."
              gh release delete $env:INPUTS_TAG --cleanup-tag -y
          }
          else{
              write-output "tag $env:INPUTS_TAG does not exist."
          }
        env:
          GH_TOKEN: ${{ github.token }}
          INPUTS_TAG: ${{inputs.tag}}
        shell: pwsh

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          run-install: false

      - name: Generate a changelog
        run: |
          pixi global install git-cliff
          git-cliff --unreleased --tag ${INPUTS_TAG} --strip header > release_changelog.md
        env:
          INPUTS_TAG: ${{inputs.tag}}

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body_path: release_changelog.md
          tag_name: ${{inputs.tag}}
          draft: true
          prerelease: ${{steps.check-tag.outputs.is_pre_release}}
