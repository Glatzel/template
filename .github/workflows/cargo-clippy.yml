# This File is automatically synchronized from https://github.com/Glatzel/template

name: cargo-clippy

on:
  workflow_dispatch:
    inputs:
      working-directory:
        type: string
        default: "."
        required: false
      args:
        type: string
        default: "--all-features"
        required: false
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
        required: false
      args:
        type: string
        default: "--all-features"
        required: false

jobs:
  cargo-clippy:
    defaults:
      run:
        working-directory: ${{inputs.working-directory}}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: |
          if (Test-Path ./scripts/setup.ps1) {
              . ./scripts/setup.ps1
          }
          cargo +stable clippy --fix ${{inputs.args}}
          cargo +stable clippy ${{inputs.args}} -- -Dwarnings
        shell: pwsh
