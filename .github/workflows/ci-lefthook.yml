# This File is automatically synchronized from https://github.com/Glatzel/template

name: Lefthook

on:
  workflow_dispatch:
  workflow_call:
  issue_comment:
    types: [created]
permissions:
  contents: write
  pull-requests: write
jobs:
  lefthook:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, 'lefthook')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'}}
        with:
          ref: ${{ github.head_ref }}

      - name: comment if triggered by comment
        id: comment
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        run: |
          url=$(gh pr comment ${{ github.event.issue.number }} --body "Lefthook is running.")
          echo "comment_url=$url" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ./lefthook/.pixi
          key: lefthook-${{ hashFiles('lefthook.yaml','./lefthook/pixi*')}}
          restore-keys: |
            lefthook

      #  pixi setup
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          run-install: false

      # pre-commit
      - name: lefthook
        run: pixi run --manifest-path ./lefthook/pixi.toml lefthook-run

      - name: Auto commit fixes
        if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, 'lefthook') && !cancelled() }}
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if (-not (git diff --cached --quiet)) {
              git commit -m "apply lefthook fixes"
              git push
              gh pr comment ${{ steps.comment.outputs.comment_url }} --body "Lefthook done. Fixes applied."
          } else {
              echo "No changes to commit"
              gh pr comment ${{ steps.comment.outputs.comment_url }} --body "Lefthook done. No changes to commit."
          }
        env:
          GH_TOKEN: ${{ github.token }}
