# This File is automatically synchronized from https://github.com/Glatzel/template

name: lefthook

on:
  workflow_dispatch:
  workflow_call:
permissions:
  contents: read
jobs:
  lefthook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ./lefthook/.pixi
          key: lefthook-${{ hashFiles('lefthook.yaml','./lefthook/pixi*')}}
          restore-keys: |
            lefthook

      #  pixi setup
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          run-install: false

      # pre-commit
      - name: lefthook
        run: pixi run --manifest-path ./lefthook/pixi.toml lefthook-run

      - name: Auto commit fixes
        if: ${{ !cancelled() && startsWith(github.ref, 'refs/pull/') && github.actor != 'github-actions[bot]' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add -A

          if (-not (git diff --cached --quiet)) {
              git commit -m "chore: apply lefthook fixes"
              git push "https://x-access-token:${env:GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          } else {
              echo "No changes to commit"
          }

